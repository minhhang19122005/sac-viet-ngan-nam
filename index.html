<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Sắc Việt ngàn năm</title>

<style>
body {
  font-family: Arial;
  margin: 0;
}

header {
  background: #c62828;
  color: white;
  padding: 20px;
  text-align: center;
}

.section {
  padding: 40px;
  text-align: center;
}

.product {
  border: 1px solid #ccc;
  padding: 15px;
  margin: 10px;
  display: inline-block;
  width: 250px;
}

button {
  background: #c62828;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

#formMua {
  display:none;
  position:fixed;
  top:20%;
  left:35%;
  background:white;
  padding:20px;
  border:2px solid black;
}
</style>
</head>

<body>

<header>
  <h1>SẮC VIỆT NGÀN NĂM</h1>
</header>

<div class="section">
  <h2>Sản phẩm</h2>

  <div class="product">
    <h3>Đất Việt</h3>
    <p>120.000đ</p>
    <button onclick="moForm('Đất Việt')">Mua ngay</button>
  </div>

  <div class="product">
    <h3>Sức Việt</h3>
    <p>120.000đ</p>
    <button onclick="moForm('Sức Việt')">Mua ngay</button>
  </div>

  <div class="product">
    <h3>Dáng Việt</h3>
    <p>120.000đ</p>
    <button onclick="moForm('Dáng Việt')">Mua ngay</button>
  </div>

</div>

<!-- FORM -->
<div id="formMua">
  <h3>Đặt hàng</h3>

  <input id="ten" type="text" placeholder="Họ tên"><br><br>
  <input id="sdt" type="text" placeholder="SĐT"><br><br>
  <input id="soluong" type="number" value="1"><br><br>

  <button onclick="guiDon()">Gửi đơn</button>
  <button onclick="dongForm()">Đóng</button>
</div>

<!-- DANH SÁCH -->
<div class="section">
  <h3>Danh sách đơn hàng</h3>
  <ul id="danhsach"></ul>
</div>

<script>
let sanPham = "";
let donHang = JSON.parse(localStorage.getItem("donHang")) || [];

function moForm(sp) {
  sanPham = sp;
  document.getElementById("formMua").style.display = "block";
}

function dongForm() {
  document.getElementById("formMua").style.display = "none";
}

function guiDon() {
  let ten = document.getElementById("ten").value;
  let sdt = document.getElementById("sdt").value;
  let sl = document.getElementById("soluong").value;

  let don = {
    ten: ten,
    sdt: sdt,
    soluong: sl,
    sanpham: sanPham
  };

  donHang.push(don);

  localStorage.setItem("donHang", JSON.stringify(donHang));

  hienThi();

  alert("Đặt hàng thành công!");

  dongForm();
}

function hienThi() {
  let ds = document.getElementById("danhsach");
  ds.innerHTML = "";

  donHang.forEach(d => {
    let li = document.createElement("li");
    li.innerText = d.ten + " - " + d.sdt + " - " + d.sanpham + " - SL: " + d.soluong;
    ds.appendChild(li);
  });
}

hienThi();
</script>

</body>
</html>
